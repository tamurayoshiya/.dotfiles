[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Command|Shift"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Command|Shift"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Command"

[scrolling]
history = 100000

[window]
opacity = 0.88
blur = false
dimensions = { columns = 80, lines = 24 }

[colors.primary]
background = "#282c34"

[font]
size = 16
